<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilentCue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1a14;
      color: #c8f0dc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .container { max-width: 480px; text-align: center; }
    .wordmark {
      font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: #1d9e75; margin-bottom: 24px;
    }
    h1 { font-size: 36px; font-weight: 200; color: #e8fdf2; margin-bottom: 16px; }
    p { font-size: 17px; font-weight: 300; line-height: 1.7; color: #c8f0dc90; margin-bottom: 40px; }
    .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    a {
      font-size: 14px; font-weight: 500; color: #1d9e75;
      text-decoration: none; letter-spacing: 0.04em;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <p class="wordmark">SilentCue</p>
    <h1>Feel the time.<br>Own the room.</h1>
    <p>A silent haptic timer for presenters, speakers, and teachers. Three distinct cues. No sound. No screen. No broken eye contact.</p>
    <a class="badge" href="https://apps.apple.com/us/app/silentcue/id6784883359">Available on the App Store</a>
  </div>

    <div class="links">
      <a href="support.html">Support</a>

  </div>
